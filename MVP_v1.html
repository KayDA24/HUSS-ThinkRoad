<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PaperOS v1 Prototype</title>
  <style>
    :root {
      --bg: #f8fafc;
      --surface: #ffffff;
      --surface-2: #f2f4f6;
      --line: #c4c5d5;
      --text: #191c1e;
      --muted: #444653;
      --primary: #00288e;
      --primary-soft: #dde1ff;
      --accent: #8f8bff;
      --danger: #d9534f;
      --ok: #2e7d32;
      --radius: 12px;
      --shadow: 0 4px 6px -1px rgba(0, 0, 0, .05), 0 2px 4px -2px rgba(0, 0, 0, .05);
    }
    * { box-sizing: border-box; }
    html, body { margin: 0; height: 100%; font-family: Inter, "Segoe UI", Arial, sans-serif; color: var(--text); background: var(--bg); }
    button, input, select, textarea { font: inherit; color: inherit; }
    .app { display: grid; grid-template-columns: 256px 1fr; min-height: 100vh; }
    .sidebar {
      background: var(--surface-2); border-right: 1px solid var(--line); padding: 24px 16px;
      display: flex; flex-direction: column; gap: 16px;
    }
    .brand { display: flex; gap: 12px; align-items: center; padding: 8px; }
    .logo { width: 32px; height: 32px; border-radius: 999px; background: var(--primary); color: #fff; display: grid; place-items: center; font-weight: 700; }
    .brand h1 { margin: 0; font-size: 24px; color: var(--primary); }
    .account { background: #eceef0; border-radius: 8px; padding: 10px; font-size: 12px; color: var(--muted); }
    .nav, .nav-foot { display: grid; gap: 4px; }
    .nav-btn {
      border: 0; background: transparent; text-align: left; border-radius: 8px; padding: 9px 12px;
      cursor: pointer; color: var(--muted); font-weight: 500;
    }
    .nav-btn.active { background: var(--accent); color: #231791; }
    .sidebar-spacer { flex: 1; }
    .content { display: grid; grid-template-rows: 64px 1fr; min-width: 0; }
    .topbar {
      display: flex; align-items: center; justify-content: space-between; gap: 16px;
      border-bottom: 1px solid var(--line); background: #f7f9fb; padding: 12px 24px;
      position: sticky; top: 0; z-index: 5;
    }
    .search { max-width: 560px; width: 100%; border: 1px solid var(--line); border-radius: 8px; padding: 10px 14px; background: #fff; }
    .top-actions { display: flex; align-items: center; gap: 12px; }
    .btn {
      border: 1px solid var(--line); background: #fff; border-radius: 8px; padding: 8px 14px; cursor: pointer;
    }
    .btn.primary { background: var(--primary); border-color: var(--primary); color: #fff; }
    .btn.ghost { background: transparent; }
    .main { padding: 24px; overflow: auto; }
    .page { display: none; }
    .page.active { display: block; }
    .h1 { font-size: 42px; margin: 0 0 8px; }
    .h2 { font-size: 30px; margin: 0 0 6px; }
    .sub { color: var(--muted); margin: 0 0 18px; }
    .cards-4 { display: grid; grid-template-columns: repeat(4, minmax(0,1fr)); gap: 16px; margin-bottom: 24px; }
    .card {
      background: var(--surface); border: 1px solid var(--line); border-radius: var(--radius); box-shadow: var(--shadow);
      padding: 16px;
    }
    .metric-label { font: 500 12px/1.2 "JetBrains Mono", monospace; letter-spacing: .6px; color: var(--muted); text-transform: uppercase; }
    .metric-value { font-size: 44px; font-weight: 700; margin-top: 10px; }
    .dash-grid { display: grid; grid-template-columns: 2fr 1fr; gap: 24px; }
    .section-title { margin: 0 0 12px; font-size: 28px; }
    .paper-row { display: flex; justify-content: space-between; align-items: start; gap: 16px; border-top: 1px solid #e5e8ec; padding: 14px 0; }
    .paper-row:first-child { border-top: 0; }
    .paper-title { margin: 0 0 4px; font-size: 20px; }
    .paper-meta { margin: 0; color: var(--muted); font-size: 14px; }
    .badge { display: inline-block; border-radius: 4px; padding: 3px 8px; border: 1px solid rgba(196,197,213,.6); background: #eceef0; font: 600 12px "JetBrains Mono", monospace; letter-spacing: .4px; }
    .tag { display: inline-flex; margin-right: 6px; margin-top: 6px; }
    .progress { height: 8px; background: #eceef0; border-radius: 999px; overflow: hidden; margin: 10px 0; }
    .progress > span { display: block; height: 100%; background: var(--primary); }
    .library-layout { display: grid; grid-template-columns: 240px 1fr; border-top: 1px solid var(--line); margin: 10px -24px -24px; }
    .filters { border-right: 1px solid var(--line); padding: 20px 16px; }
    .filter-block { margin-bottom: 24px; }
    .filter-title { font: 600 12px "JetBrains Mono", monospace; letter-spacing: .7px; color: var(--muted); margin: 0 0 8px; text-transform: uppercase; }
    .filters label { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; }
    .grid { padding: 20px; display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 16px; align-content: start; }
    .library-card .paper-title { font-size: 22px; min-height: 56px; }
    .lib-footer { display: flex; align-items: center; justify-content: space-between; margin-top: 12px; padding-top: 12px; border-top: 1px solid #e5e8ec; color: var(--muted); font-size: 13px; }
    .add-wrap { max-width: 1020px; margin: 0 auto; }
    .form-grid { display: grid; gap: 14px; }
    .dropzone { border: 2px dashed #bfc4d1; border-radius: 10px; text-align: center; padding: 32px 16px; color: var(--muted); }
    .field label { display: block; font-size: 13px; color: var(--muted); margin-bottom: 6px; }
    .field input, .field select, .field textarea { width: 100%; border: 1px solid var(--line); border-radius: 8px; padding: 10px 12px; background: #fff; }
    .field textarea { min-height: 90px; resize: vertical; }
    .split-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
    .split-3 { display: grid; grid-template-columns: 2fr 1fr 1fr; gap: 14px; }
    .detail-grid { display: grid; grid-template-columns: 45% 30% 25%; gap: 0; border-top: 1px solid var(--line); margin: 0 -24px -24px; min-height: calc(100vh - 88px); }
    .pane { border-right: 1px solid var(--line); background: #f9fbfd; }
    .pane:last-child { border-right: 0; }
    .pane-head { display: flex; justify-content: space-between; align-items: center; padding: 14px 16px; border-bottom: 1px solid var(--line); background: #fff; }
    .pane-body { padding: 16px; }
    .pdf-mock { background: #fff; border: 1px solid var(--line); border-radius: 8px; min-height: 760px; padding: 20px; }
    .note-section { margin-bottom: 10px; }
    .note-section label { display: block; font: 600 12px "JetBrains Mono", monospace; letter-spacing: .6px; color: var(--muted); margin-bottom: 6px; text-transform: uppercase; }
    .checklist { list-style: none; padding: 0; margin: 0; }
    .checklist li { display: flex; gap: 8px; align-items: center; margin-bottom: 8px; }
    .plan-board { display: grid; grid-template-columns: repeat(4, minmax(0,1fr)); gap: 16px; align-items: start; }
    .plan-col h3 { margin: 0 0 10px; font: 600 13px "JetBrains Mono", monospace; letter-spacing: .5px; color: var(--muted); text-transform: uppercase; }
    .plan-card { background: #fff; border: 1px solid var(--line); border-radius: 8px; padding: 12px; margin-bottom: 10px; }
    .plan-actions { display: flex; gap: 6px; flex-wrap: wrap; margin-top: 8px; }
    .mini { padding: 4px 8px; font-size: 12px; }
    @media (max-width: 1200px) {
      .cards-4 { grid-template-columns: repeat(2, minmax(0,1fr)); }
      .dash-grid { grid-template-columns: 1fr; }
      .detail-grid { grid-template-columns: 1fr; }
      .pane { border-right: 0; border-bottom: 1px solid var(--line); }
      .plan-board { grid-template-columns: repeat(2, minmax(0,1fr)); }
    }
    @media (max-width: 900px) {
      .app { grid-template-columns: 1fr; }
      .sidebar { display: none; }
      .library-layout { grid-template-columns: 1fr; }
      .filters { border-right: 0; border-bottom: 1px solid var(--line); }
      .split-2, .split-3 { grid-template-columns: 1fr; }
      .plan-board { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <div class="app">
    <aside class="sidebar">
      <div class="brand">
        <div class="logo">P</div>
        <h1>PaperOS</h1>
      </div>
      <div class="account">Research Account<br /><strong>Dr. A. Turing</strong> / Premium</div>
      <nav class="nav" id="navMain"></nav>
      <div class="sidebar-spacer"></div>
      <nav class="nav-foot">
        <button class="nav-btn">Help</button>
        <button class="nav-btn">Logout</button>
      </nav>
    </aside>

    <section class="content">
      <header class="topbar">
        <input class="search" id="globalSearch" placeholder="Search papers, notes, tags..." />
        <div class="top-actions">
          <button class="btn ghost">Notifications</button>
          <button class="btn primary" id="quickAdd">+ Add Paper</button>
        </div>
      </header>
      <main class="main">
        <section class="page" id="page-dashboard"></section>
        <section class="page" id="page-library"></section>
        <section class="page" id="page-add"></section>
        <section class="page" id="page-detail"></section>
        <section class="page" id="page-plan"></section>
      </main>
    </section>
  </div>

  <script>
    const pages = [
      { id: "dashboard", label: "Dashboard" },
      { id: "library", label: "Papers" },
      { id: "add", label: "Add Paper" },
      { id: "detail", label: "Paper Detail" },
      { id: "plan", label: "Reading Plan" }
    ];

    const state = {
      page: "dashboard",
      query: "",
      selectedPaperId: "p2",
      uploadProgress: 0,
      filters: { status: new Set(["Reading"]), priority: new Set(["Core"]), field: new Set() },
      papers: [
        { id: "p1", title: "Training language models to follow instructions with human feedback", authors: "Ouyang et al.", year: 2022, venue: "OpenAI", status: "Reading", priority: "Core", field: "NLP", tags: ["RLHF", "Alignment"], progress: 65, notes: 12, updated: "2h ago", summary: "Introduces instruction tuning + RLHF to align model behavior with user intent." },
        { id: "p2", title: "Retrieval-Augmented Generation for Knowledge-Intensive NLP Tasks", authors: "Lewis et al.", year: 2020, venue: "Meta", status: "To Read", priority: "High", field: "RAG", tags: ["RAG", "NLP"], progress: 12, notes: 2, updated: "Yesterday", summary: "Combines parametric memory with external retrieval to improve factual generation." },
        { id: "p3", title: "Chain-of-Thought Prompting Elicits Reasoning in Language Models", authors: "Wei et al.", year: 2022, venue: "Google", status: "Skimming", priority: "Medium", field: "Prompting", tags: ["Prompting", "Reasoning"], progress: 38, notes: 5, updated: "3d ago", summary: "Shows few-shot chain-of-thought examples can unlock multi-step reasoning." },
        { id: "p4", title: "Language Models are Few-Shot Learners", authors: "Brown et al.", year: 2020, venue: "NeurIPS", status: "Reading", priority: "Core", field: "LLM", tags: ["LLM", "Scaling"], progress: 52, notes: 18, updated: "5d ago", summary: "Presents GPT-3 scaling behavior and in-context learning capability." },
        { id: "p5", title: "Attention Is All You Need", authors: "Vaswani et al.", year: 2017, venue: "NeurIPS", status: "Completed", priority: "Core", field: "Architecture", tags: ["Transformer"], progress: 100, notes: 24, updated: "1w ago", summary: "Introduces Transformer architecture and removes recurrence from sequence modeling." }
      ],
      detailNotes: {
        oneLine: "High-level takeaway...",
        problem: "What are they solving?",
        contribution: "The novel part...",
        method: "How they did it...",
        experiments: "Results and datasets...",
        limitations: "What's missing?",
        takeaways: "Personal learnings..."
      },
      checklist: [
        { id: "c1", label: "Can explain problem", done: false },
        { id: "c2", label: "Understood methodology", done: false },
        { id: "c3", label: "Checked references", done: true }
      ]
    };

    const q = (sel) => document.querySelector(sel);

    function filteredPapers() {
      return state.papers.filter((p) => {
        const hit = `${p.title} ${p.authors} ${p.tags.join(" ")}`.toLowerCase().includes(state.query.toLowerCase());
        const status = state.filters.status.size ? state.filters.status.has(p.status) : true;
        const priority = state.filters.priority.size ? state.filters.priority.has(p.priority) : true;
        const field = state.filters.field.size ? state.filters.field.has(p.field) : true;
        return hit && status && priority && field;
      });
    }

    function renderNav() {
      const nav = q("#navMain");
      nav.innerHTML = pages.map((p) => `<button class="nav-btn ${state.page === p.id ? "active" : ""}" data-go="${p.id}">${p.label}</button>`).join("");
      nav.querySelectorAll("[data-go]").forEach((btn) => btn.addEventListener("click", () => { state.page = btn.dataset.go; render(); }));
    }

    function metricCounts() {
      return {
        total: state.papers.length,
        toRead: state.papers.filter((p) => p.status === "To Read").length,
        reading: state.papers.filter((p) => p.status === "Reading").length,
        done: state.papers.filter((p) => p.status === "Completed").length
      };
    }

    function renderDashboard() {
      const m = metricCounts();
      const current = state.papers.find((p) => p.status === "Reading") || state.papers[0];
      const fields = Object.entries(state.papers.reduce((acc, p) => (acc[p.field] = (acc[p.field] || 0) + 1, acc), {}));
      q("#page-dashboard").innerHTML = `
        <h2 class="h2">Good Morning, Researcher.</h2>
        <p class="sub">You have <strong>${m.reading} papers</strong> to deep-read this week.</p>
        <div class="cards-4">
          <article class="card"><div class="metric-label">Total Papers</div><div class="metric-value">${m.total}</div></article>
          <article class="card"><div class="metric-label">To Read</div><div class="metric-value">${m.toRead}</div></article>
          <article class="card"><div class="metric-label">Reading</div><div class="metric-value">${m.reading}</div></article>
          <article class="card"><div class="metric-label">Completed</div><div class="metric-value">${m.done}</div></article>
        </div>
        <div class="dash-grid">
          <div>
            <h3 class="section-title">Continue Reading</h3>
            <article class="card">
              <div class="badge">${current.field}</div>
              <h4 class="paper-title">${current.title}</h4>
              <p class="paper-meta">${current.authors} · ${current.year} · ${current.venue}</p>
              <div class="progress"><span style="width:${current.progress}%"></span></div>
              <p class="paper-meta">Progress ${current.progress}%</p>
              <div style="display:flex;gap:10px;margin-top:12px">
                <button class="btn primary" id="resumeBtn">Resume Deep Dive</button>
                <button class="btn" id="viewNotesBtn">View Notes</button>
              </div>
            </article>
            <h3 class="section-title" style="margin-top:24px">Recent Uploads</h3>
            <article class="card">${state.papers.slice(0, 3).map((p) => `
              <div class="paper-row">
                <div><h4 class="paper-title">${p.title}</h4><p class="paper-meta">${p.authors}</p></div>
                <div><span class="badge">${p.status}</span></div>
              </div>
            `).join("")}</article>
          </div>
          <div>
            <article class="card">
              <h3 class="section-title" style="font-size:30px">Field Distribution</h3>
              ${fields.map(([f, n]) => `<div style="margin-bottom:10px"><div class="paper-meta">${f} · ${n}</div><div class="progress"><span style="width:${(n/state.papers.length)*100}%"></span></div></div>`).join("")}
            </article>
            <article class="card" style="margin-top:16px">
              <h3 class="section-title" style="font-size:30px">Core Papers</h3>
              ${state.papers.filter((p) => p.priority === "Core").slice(0, 3).map((p) => `<p style="margin:0 0 14px"><strong>${p.title}</strong><br /><span class="paper-meta">${p.authors} · ${p.year}</span></p>`).join("")}
            </article>
          </div>
        </div>`;
      q("#resumeBtn").onclick = () => { state.selectedPaperId = current.id; state.page = "detail"; render(); };
      q("#viewNotesBtn").onclick = () => { state.selectedPaperId = current.id; state.page = "detail"; render(); };
    }

    function toggleSet(set, value) { set.has(value) ? set.delete(value) : set.add(value); renderLibrary(); }

    function renderLibrary() {
      const list = filteredPapers();
      q("#page-library").innerHTML = `
        <h2 class="h2">Papers Library</h2><p class="sub">Manage and organize your academic research</p>
        <div class="library-layout">
          <aside class="filters">
            <div class="filter-block"><p class="filter-title">Reading Status</p>
              ${["To Read","Skimming","Reading","Completed"].map((v) => `<label><input type="checkbox" data-status="${v}" ${state.filters.status.has(v) ? "checked" : ""}/> ${v}</label>`).join("")}
            </div>
            <div class="filter-block"><p class="filter-title">Priority</p>
              ${["Core","High","Medium"].map((v) => `<label><input type="checkbox" data-priority="${v}" ${state.filters.priority.has(v) ? "checked" : ""}/> ${v}</label>`).join("")}
            </div>
            <div class="filter-block"><p class="filter-title">Fields</p>
              ${["LLM","RAG","Prompting","Architecture","NLP"].map((v) => `<label><input type="checkbox" data-field="${v}" ${state.filters.field.has(v) ? "checked" : ""}/> ${v}</label>`).join("")}
            </div>
          </aside>
          <div class="grid">
            ${list.map((p) => `<article class="card library-card">
              <h4 class="paper-title">${p.title}</h4>
              <p class="paper-meta">${p.authors} · ${p.year} · ${p.venue}</p>
              <div style="margin-top:8px">
                <span class="badge">${p.status}</span>
                <span class="badge">${p.priority}</span>
              </div>
              <div>${p.tags.map((t) => `<span class="badge tag">#${t}</span>`).join("")}</div>
              <div class="lib-footer"><span>${p.updated}</span><button class="btn mini" data-open="${p.id}">Open</button></div>
            </article>`).join("")}
          </div>
        </div>`;
      q("#page-library").querySelectorAll("[data-open]").forEach((btn) => btn.onclick = () => { state.selectedPaperId = btn.dataset.open; state.page = "detail"; render(); });
      q("#page-library").querySelectorAll("[data-status]").forEach((el) => el.onchange = () => toggleSet(state.filters.status, el.dataset.status));
      q("#page-library").querySelectorAll("[data-priority]").forEach((el) => el.onchange = () => toggleSet(state.filters.priority, el.dataset.priority));
      q("#page-library").querySelectorAll("[data-field]").forEach((el) => el.onchange = () => toggleSet(state.filters.field, el.dataset.field));
    }

    function renderAddPaper() {
      q("#page-add").innerHTML = `
        <div class="add-wrap">
          <h2 class="h2">Add New Paper</h2>
          <p class="sub">Upload a PDF and complete metadata before saving to your library.</p>
          <article class="card">
            <div class="dropzone">
              <input id="pdfFile" type="file" accept=".pdf" style="display:none" />
              <p style="font-size:20px;margin:0 0 8px">Drop your PDF here or click to browse</p>
              <p class="paper-meta" style="margin:0">Supports PDF, max 50MB</p>
              <button class="btn" id="pickPdf" style="margin-top:12px">Choose PDF</button>
            </div>
            <div class="card" style="margin-top:14px">
              <strong id="uploadName">No file selected</strong>
              <div class="progress"><span id="uploadBar" style="width:${state.uploadProgress}%"></span></div>
              <p class="paper-meta">Upload progress: <span id="uploadPct">${state.uploadProgress}%</span></p>
            </div>
            <form class="form-grid" id="addForm" style="margin-top:14px">
              <div class="field"><label>Title</label><input name="title" required value="Language Models are Few-Shot Learners" /></div>
              <div class="split-3">
                <div class="field"><label>Authors</label><input name="authors" required value="Brown et al." /></div>
                <div class="field"><label>Year</label><input name="year" required value="2020" /></div>
                <div class="field"><label>Venue</label><input name="venue" required value="NeurIPS" /></div>
              </div>
              <div class="split-2">
                <div class="field"><label>Status</label><select name="status"><option>To Read</option><option>Skimming</option><option>Reading</option></select></div>
                <div class="field"><label>Priority</label><select name="priority"><option>High</option><option>Core</option><option>Medium</option></select></div>
              </div>
              <div class="split-2">
                <div class="field"><label>Field</label><input name="field" value="LLM" /></div>
                <div class="field"><label>Tags (comma separated)</label><input name="tags" value="LLM,Few-Shot" /></div>
              </div>
              <div class="field"><label>Why Read?</label><textarea name="why">This paper is foundational for current language model research.</textarea></div>
              <div style="display:flex;justify-content:flex-end;gap:10px">
                <button type="button" class="btn" id="cancelAdd">Cancel</button>
                <button class="btn primary">Save to Library</button>
              </div>
            </form>
          </article>
        </div>`;

      q("#pickPdf").onclick = () => q("#pdfFile").click();
      q("#pdfFile").onchange = (e) => {
        const f = e.target.files[0];
        if (!f) return;
        q("#uploadName").textContent = f.name;
        state.uploadProgress = 0;
        const timer = setInterval(() => {
          state.uploadProgress = Math.min(100, state.uploadProgress + 8);
          q("#uploadBar").style.width = state.uploadProgress + "%";
          q("#uploadPct").textContent = state.uploadProgress + "%";
          if (state.uploadProgress >= 100) clearInterval(timer);
        }, 120);
      };
      q("#cancelAdd").onclick = () => { state.page = "library"; render(); };
      q("#addForm").onsubmit = (e) => {
        e.preventDefault();
        const fd = new FormData(e.target);
        const p = {
          id: "p" + Date.now(),
          title: fd.get("title"),
          authors: fd.get("authors"),
          year: Number(fd.get("year")),
          venue: fd.get("venue"),
          status: fd.get("status"),
          priority: fd.get("priority"),
          field: fd.get("field"),
          tags: String(fd.get("tags")).split(",").map((s) => s.trim()).filter(Boolean),
          progress: 0,
          notes: 0,
          updated: "Just now",
          summary: "Summary will be generated after first pass."
        };
        state.papers.unshift(p);
        state.selectedPaperId = p.id;
        state.page = "library";
        render();
        alert("Paper saved to library.");
      };
    }

    function renderDetail() {
      const p = state.papers.find((x) => x.id === state.selectedPaperId) || state.papers[0];
      q("#page-detail").innerHTML = `
        <div class="detail-grid">
          <section class="pane">
            <div class="pane-head"><strong>${p.title}</strong><span class="paper-meta">${p.status}</span></div>
            <div class="pane-body">
              <article class="pdf-mock">
                <h3 style="text-align:center;font-size:44px;margin:20px 0">${p.title}</h3>
                <p style="text-align:center" class="paper-meta">${p.authors} · ${p.venue} ${p.year}</p>
                <hr style="border:0;border-top:1px solid #e5e8ec;margin:24px 0">
                <h4>Abstract</h4>
                <p style="line-height:1.7;color:#353742">Recent work demonstrates strong results with large-scale pretraining, retrieval, and alignment. This prototype simulates a PDF reader panel where highlights and page navigation can later be connected to a real PDF parser.</p>
                <p style="line-height:1.7;color:#353742">For v1 commercial readiness, this section should support annotation linking, citation jumps, and keyboard-first navigation.</p>
              </article>
            </div>
          </section>
          <section class="pane">
            <div class="pane-head"><strong>Research Notes</strong><button class="btn mini">Save Draft</button></div>
            <div class="pane-body">
              ${Object.entries(state.detailNotes).map(([k,v]) => `
                <div class="note-section">
                  <label>${k.replace(/[A-Z]/g, (m) => " " + m).toUpperCase()}</label>
                  <textarea data-note="${k}">${v}</textarea>
                </div>`).join("")}
            </div>
          </section>
          <section class="pane">
            <div class="pane-head"><strong>Utility & AI</strong><span class="paper-meta">${p.field}</span></div>
            <div class="pane-body">
              <div class="field"><label>Status</label><select id="detailStatus">${["To Read","Skimming","Reading","Completed"].map((s)=>`<option ${p.status===s?"selected":""}>${s}</option>`).join("")}</select></div>
              <div class="field"><label>Priority</label><select id="detailPriority">${["Core","High","Medium"].map((s)=>`<option ${p.priority===s?"selected":""}>${s}</option>`).join("")}</select></div>
              <h4 style="margin:18px 0 10px">Review Checklist</h4>
              <ul class="checklist">
                ${state.checklist.map((c) => `<li><input type="checkbox" data-check="${c.id}" ${c.done ? "checked":""}/><span>${c.label}</span></li>`).join("")}
              </ul>
              <h4 style="margin:18px 0 10px">AI Summary Draft</h4>
              <div class="card" style="padding:12px"><textarea id="aiSummary" style="min-height:130px">${p.summary}</textarea><button class="btn primary" style="margin-top:8px;width:100%" id="applySummary">Apply to Notes</button></div>
              <h4 style="margin:18px 0 10px">Related Papers</h4>
              <div>${state.papers.filter((x) => x.id !== p.id).slice(0,2).map((x) => `<article class="card" style="padding:10px;margin-bottom:8px"><strong>${x.title}</strong><p class="paper-meta">${x.authors} · ${x.year}</p></article>`).join("")}</div>
            </div>
          </section>
        </div>`;
      q("#page-detail").querySelectorAll("[data-note]").forEach((el) => el.oninput = () => state.detailNotes[el.dataset.note] = el.value);
      q("#page-detail").querySelectorAll("[data-check]").forEach((el) => el.onchange = () => { const c = state.checklist.find((x) => x.id === el.dataset.check); c.done = el.checked; });
      q("#detailStatus").onchange = (e) => { p.status = e.target.value; render(); };
      q("#detailPriority").onchange = (e) => { p.priority = e.target.value; render(); };
      q("#applySummary").onclick = () => { state.detailNotes.oneLine = q("#aiSummary").value.slice(0, 120); renderDetail(); };
    }

    function renderPlan() {
      const columns = [
        { label: "To Read", key: "To Read" },
        { label: "Skimming", key: "Skimming" },
        { label: "Deep Reading", key: "Reading" },
        { label: "Completed", key: "Completed" }
      ];
      q("#page-plan").innerHTML = `
        <h2 class="h2">Weekly Research Plan</h2>
        <p class="sub">Track reading flow from backlog to completion.</p>
        <div class="plan-board">
          ${columns.map((col) => `
            <section class="plan-col">
              <h3>${col.label} (${state.papers.filter((p) => p.status === col.key).length})</h3>
              ${state.papers.filter((p) => p.status === col.key).map((p) => `<article class="plan-card">
                <div class="badge">${p.field}</div>
                <h4 style="margin:8px 0">${p.title}</h4>
                <p class="paper-meta">${p.authors}</p>
                <div class="plan-actions">
                  ${columns.filter((c) => c.key !== col.key).map((c) => `<button class="btn mini" data-move="${p.id}|${c.key}">Move: ${c.label}</button>`).join("")}
                </div>
              </article>`).join("")}
            </section>
          `).join("")}
        </div>
        <article class="card" style="margin-top:22px">
          <strong>Reading Velocity</strong>
          <p class="paper-meta">${state.papers.filter((p) => p.status === "Completed").length * 3} papers / month projected</p>
        </article>`;
      q("#page-plan").querySelectorAll("[data-move]").forEach((btn) => btn.onclick = () => {
        const [id, next] = btn.dataset.move.split("|");
        const p = state.papers.find((x) => x.id === id);
        p.status = next;
        renderPlan();
      });
    }

    function render() {
      renderNav();
      q("#globalSearch").value = state.query;
      document.querySelectorAll(".page").forEach((pg) => pg.classList.remove("active"));
      q(`#page-${state.page}`).classList.add("active");
      renderDashboard();
      renderLibrary();
      renderAddPaper();
      renderDetail();
      renderPlan();
    }

    q("#globalSearch").addEventListener("input", (e) => { state.query = e.target.value; renderLibrary(); if (state.page === "dashboard") renderDashboard(); });
    q("#quickAdd").onclick = () => { state.page = "add"; render(); };
    render();
  </script>
</body>
</html>
